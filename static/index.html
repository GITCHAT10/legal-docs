<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iMOXON | Maldives Local Economy Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glow { box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
        .bg-mnos { background-color: #0f172a; }
    </style>
</head>
<body class="bg-mnos text-slate-100 font-sans min-h-screen">

    <nav class="border-b border-slate-700 p-4 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-tighter text-blue-400">iMOXON <span class="text-xs text-slate-500 font-mono">v1.0.0-RC1 (SOVEREIGN)</span></h1>
            <div id="user-status" class="text-sm font-mono text-emerald-400">Not Logged In</div>
        </div>
    </nav>

    <main class="container mx-auto p-6 grid grid-cols-1 lg:grid-cols-3 gap-6">

        <div class="lg:col-span-2 space-y-6">

            <section class="bg-slate-800/50 p-6 rounded-xl border border-slate-700">
                <h2 class="text-xl font-semibold mb-4 border-b border-slate-700 pb-2">1. AEGIS Onboarding</h2>
                <div class="flex gap-4">
                    <button onclick="onboard('LOCAL_USER')" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded font-medium transition">Register Local</button>
                    <button onclick="onboard('TOURIST_USER')" class="bg-red-600 hover:bg-red-500 px-4 py-2 rounded font-medium transition">Try Tourist (Block)</button>
                </div>
            </section>

            <section class="bg-slate-800/50 p-6 rounded-xl border border-slate-700">
                <h2 class="text-xl font-semibold mb-4 border-b border-slate-700 pb-2">2. iMOXON MOVE (Transport)</h2>
                <div class="grid grid-cols-1 gap-4">
                    <button onclick="requestRide()" class="bg-slate-700 hover:bg-slate-600 py-3 rounded-lg text-lg font-bold">Request Local Taxi (MVR 15 base)</button>
                </div>
            </section>

            <section class="bg-slate-800/50 p-6 rounded-xl border border-slate-700">
                <h2 class="text-xl font-semibold mb-4 border-b border-slate-700 pb-2">3. Services & Governance</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <button onclick="enrollEdu()" class="bg-slate-700 p-4 rounded border border-slate-600 hover:border-blue-400 transition">
                        <div class="text-sm font-bold">iMOXON LEARN</div>
                        <div class="text-xs text-slate-400 mt-1">Enroll in Course</div>
                    </button>
                    <button onclick="activateHMS()" class="bg-slate-700 p-4 rounded border border-slate-600 hover:border-emerald-400 transition">
                        <div class="text-sm font-bold">iSKY CLOUD HMS</div>
                        <div class="text-xs text-slate-400 mt-1">Activate SaaS</div>
                    </button>
                    <button onclick="triggerDeen()" class="bg-slate-700 p-4 rounded border border-slate-600 hover:border-amber-400 transition">
                        <div class="text-sm font-bold">iMOXON DEEN</div>
                        <div class="text-xs text-slate-400 mt-1">Faith Reminder</div>
                    </button>
                </div>
            </section>

        </div>

        <div class="space-y-6">
            <section class="bg-slate-900 p-6 rounded-xl border border-blue-500/30 glow h-[80vh] flex flex-col">
                <h2 class="text-xl font-semibold mb-4 text-blue-400 flex items-center">
                    <span class="mr-2">📡</span> AEGIS DOME
                </h2>
                <div id="event-log" class="flex-grow overflow-y-auto space-y-2 font-mono text-[10px]">
                </div>
                <div class="mt-4 pt-4 border-t border-slate-800">
                    <div class="flex justify-between text-[10px] font-mono">
                        <span>INTEGRITY: <span id="integrity-status" class="text-emerald-400">SECURE</span></span>
                        <span>SHADOW: <span class="text-blue-400">ACTIVE</span></span>
                    </div>
                </div>
            </section>
        </div>

    </main>

    <script>
        let currentUser = null;
        const API_BASE = "";

        async function onboard(role) {
            try {
                const res = await fetch(`${API_BASE}/auth/onboard`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json', 'Idempotency-Key': Date.now().toString()},
                    body: JSON.stringify({name: "Maldivian User", role: role, device_id: "trusted-device-101"})
                });
                const data = await res.json();
                if(res.ok) {
                    currentUser = {did: data.did, role: role, device_id: "trusted-device-101"};
                    document.getElementById('user-status').innerText = `${role}: ${data.did.slice(0,8)}`;
                    logEvent("AEGIS.ACTOR_ONBOARDED", data);
                } else {
                    alert(`AEGIS BLOCK: ${data.detail || 'Access Denied'}`);
                    logEvent("AEGIS.DENIED", data);
                }
            } catch(e) { console.error(e); }
        }

        async function requestRide() {
            if(!currentUser) return alert("Onboard first!");
            const res = await fetch(`${API_BASE}/transport/ride`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    user_id: currentUser.did,
                    device_id: currentUser.device_id,
                    role: currentUser.role,
                    pickup: "Male",
                    destination: "Airport"
                })
            });
            const data = await res.json();
            logEvent("IMOXON.MOVE.RIDE_REQUESTED", data.ride);
            alert(`Ride Matched! Fare: ${data.ride.fare.total} MVR`);
        }

        async function enrollEdu() {
            if(!currentUser) return alert("Onboard first!");
            const res = await fetch(`${API_BASE}/edu/enroll`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    student_id: currentUser.did,
                    institute_id: "inst_1",
                    course_id: "python_101",
                    fee: 500.0
                })
            });
            const data = await res.json();
            logEvent("IMOXON.LEARN.ENROLLED", data.enrollment);
            alert("Enrolled successfully via FCE Authority.");
        }

        async function activateHMS() {
            if(!currentUser) return alert("Onboard first!");
            const res = await fetch(`${API_BASE}/isky/activate?operator_id=${currentUser.did}`, {method: 'POST'});
            const data = await res.json();
            logEvent("ISKY.HMS_ACTIVATED", data.activation);
            alert("iSKY Cloud HMS Activated ($100 Setup).");
        }

        async function triggerDeen() {
            await fetch(`${API_BASE}/faith/reminder?prayer=Isha&island=Male`, {method: 'POST'});
            logEvent("IMOXON.DEEN.REMINDER", {prayer: "Isha"});
            alert("Deen Reminder Emitted via EVENTS.");
        }

        function logEvent(type, payload) {
            const log = document.getElementById('event-log');
            const entry = document.createElement('div');
            entry.className = 'p-2 bg-slate-800 border-l-2 border-blue-500';
            entry.innerHTML = `
                <div class="text-blue-400 font-bold">${type}</div>
                <pre class="text-emerald-500 overflow-hidden text-[8px]">${JSON.stringify(payload, null, 2)}</pre>
            `;
            log.prepend(entry);
        }

        setInterval(async () => {
            try {
                const res = await fetch(`${API_BASE}/health`);
                const data = await res.json();
                document.getElementById('integrity-status').innerText = data.shadow_integrity ? 'SECURE' : 'COMPROMISED';
                document.getElementById('integrity-status').className = data.shadow_integrity ? 'text-emerald-400' : 'text-red-500';
            } catch(e) {}
        }, 5000);
    </script>
</body>
</html>
