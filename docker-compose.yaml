services:
  admiralda-pbx:
    build:
      context: .
      dockerfile: admiralda_pbx/Dockerfile
    ports:
      - "8001:8001"
    environment:
      - TESTING=0
      - MNOS_GATEWAY_URL=http://mnos-gateway:8000
    depends_on:
      - mnos-gateway

  mnos-gateway:
    image: python:3.12-slim
    # Simplified for staging mock
    command: python -m http.server 8000
    ports:
      - "8000:8000"
