version: '3.8'

services:
  kong:
    image: kong:3.4-alpine
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /opt/kong/kong_phase1.yaml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    volumes:
      - ./mnos/interfaces/api_fabric/kong_phase1.yaml:/opt/kong/kong_phase1.yaml
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8443:8443"

  mnos-core:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - NODE_TYPE=CORE
      - SYNC_MODE=REALTIME
    ports:
      - "8080:8080"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

networks:
  default:
    name: mnos-sovereign-net
