version: "3.9"
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: island_commerce
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    networks: [internal]

  redis:
    image: redis:7-alpine
    networks: [internal]

  mall:
    build: ./mall
    networks: [internal, public]

  wallet:
    build: ./wallet
    networks: [internal]

  gate:
    build: ./gate
    networks: [internal]

  ledger:
    build: ./ledger
    networks: [internal]

networks:
  public:
  internal:
    internal: true
