[pytest]
# Test Evidence Gate (Fortress Build)
# -x: exit on first failure
# -W error: treat warnings as errors
# -ra: show extra test summary info for all tests
addopts = -x -ra -W error
pythonpath = .
strict_config = true
strict_markers = true

# Enforce discovery of specific patterns
python_files = test_*.py *_suite.py *_verification.py *_tests.py *_certification.py *_verification.py final_hard_verification.py

# Enforce no-skip policy: any skipped test will be treated as failure
# (Note: pytest doesn't have a direct 'fail on skip' flag in .ini,
# but we enforce it via doctrine and review)
