    tax_profile: "TOURISM_17_10"
    privacy_policy_version: "1.2"
    rate_limits:
      requests_per_minute: 120
    sync_direction: "bidirectional"
    inventory_types:
      - hotel_room
      - villa
    timeout_seconds: 20
    retry_settings:
      max_retries: 5
      backoff_factor: 1.5
    webhook_settings:
      enabled: true
      endpoint: "/webhooks/siteminder"
    fallback_policy: "REJECT"
    transfer_rules: "maldives_mandatory_feasibility"

  travelgatex:
