channels:
  adalte:
    tenant_id: "PH-ADALTE-001"
    enabled: true
    base_url: "https://api.adalte.com/v1"
    auth_type: "HMAC"
    base_currency: "USD"
    tax_profile: "TOURISM_17_10"
    privacy_policy_version: "1.2"
    rate_limits:
      requests_per_minute: 60
    sync_direction: "bidirectional"
    inventory_types:
      - tour_package
      - bundle
      - activity
    timeout_seconds: 30
    retry_settings:
      max_retries: 3
      backoff_factor: 2
    webhook_settings:
      enabled: true
      endpoint: "/webhooks/adalte"
    fallback_policy: "REJECT"
    transfer_rules: "maldives_mandatory_feasibility"

  siteminder:
    tenant_id: "PH-SITEMINDER-001"
