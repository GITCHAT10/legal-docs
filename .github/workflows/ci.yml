name: iMOXON Sovereign Audit CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  audit:
    name: auditExpected
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install jsonschema pyyaml pytest pytest-asyncio fastapi httpx jinja2 python-multipart

    - name: Run Boot Check
      run: NEXGEN_SECRET=audit-test python mnos/boot_check.py

    - name: Run Schema Validation
      run: python validate_schema.py

    - name: Run Lint
      run: ruff check . || true

    - name: Run MNOS Core Tests
      run: PYTHONPATH=. python -m pytest tests/
