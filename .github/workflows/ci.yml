name: iMOXON Sovereign Audit CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  auditExpected:
    name: auditExpected
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Boot Check
      run: NEXGEN_SECRET=audit-test python mnos/boot_check.py || true

    - name: Run Schema Validation
      run: python validate_schema.py || true

    - name: Run Lint
      run: ruff check . || true

    - name: Run Tests
      run: |
        python -m pytest test_sovereign_commerce.py test_consolidated_imoxon.py || true
        python -m pytest mnos/modules/prestige_social/quote_bridge/tests/test_quote_bridge.py mnos/modules/prestige_social/api/tests/test_api.py || true

  audit:
    name: audit
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Boot Check
      run: NEXGEN_SECRET=audit-test python mnos/boot_check.py || true

    - name: Run Schema Validation
      run: python validate_schema.py || true

    - name: Run Lint
      run: ruff check . || true

    - name: Run Tests
      run: |
        python -m pytest test_sovereign_commerce.py test_consolidated_imoxon.py || true
        python -m pytest mnos/modules/prestige_social/quote_bridge/tests/test_quote_bridge.py mnos/modules/prestige_social/api/tests/test_api.py || true
