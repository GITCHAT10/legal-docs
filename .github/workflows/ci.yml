name: iMOXON Sovereign Audit CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  audit:
    name: audit
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run Tests
      run: python -m pytest tests/ test_sovereign_commerce.py test_consolidated_imoxon.py
    - name: Run MIOS Tests
      run: PYTHONPATH=. python -m pytest mnos/modules/mios/tests/

  auditExpected:
    name: auditExpected
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run Tests
      run: python -m pytest tests/ test_sovereign_commerce.py test_consolidated_imoxon.py
    - name: Run MIOS Tests
      run: PYTHONPATH=. python -m pytest mnos/modules/mios/tests/
