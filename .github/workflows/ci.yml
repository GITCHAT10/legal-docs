name: iMOXON Sovereign Audit CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  auditExpected:
    name: auditExpected
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pydantic pytest-asyncio httpx python-multipart fastapi starlette pyyaml

    - name: Run Boot Check
      run: NEXGEN_SECRET=audit-test python mnos/boot_check.py || true

    - name: Run Schema Validation
      run: python validate_schema.py || true

    - name: Run Lint
      run: ruff check . || true

    - name: Run Tests
      run: |
        export PYTHONPATH=$PYTHONPATH:.
        python -m pytest test_sovereign_commerce.py test_consolidated_imoxon.py tests/test_prestige_staging.py tests/test_pr38_blockers.py tests/test_prestige_contracts.py tests/test_prestige_completion.py tests/test_prestige_final_verify.py tests/prestige/channel/test_channel_manager.py tests/prestige/flight_matrix/test_flight_matrix.py tests/prestige/supplier_portal/test_supplier_portal.py

  audit:
    name: audit
    needs: auditExpected
    runs-on: ubuntu-latest
    steps:
    - name: Confirm Audit
      run: echo "iMOXON Sovereign Audit CI / audit verified"
