<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPOS Cloud | Universal Commerce Cloud for Resorts</title>
    <link rel="stylesheet" href="/static/css/upos_style.css">
    <style>
        .hero {
            padding: 4rem 2rem;
            text-align: center;
            background: linear-gradient(180deg, var(--upos-navy) 0%, #003366 100%);
            color: white;
        }
        .section {
            padding: 3rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
        }
        .card {
            border: 1px solid var(--upos-silver);
            padding: 1.5rem;
            border-radius: 8px;
        }
    </title>
</head>
<body>
    <header class="hero">
        <h1>The United Universal Commerce Cloud for Island Economies</h1>
        <p>From checkout to customs, cargo boats, resort delivery, WiFi, settlement, and audit — all in one SHADOW-proven system.</p>
        <div style="margin-top: 2rem;">
            <button class="btn-primary">Request Resort Demo</button>
            <button class="btn-primary" style="background: transparent; border: 1px solid white;">Join Pilot Program</button>
        </div>
    </header>

    <section class="section">
        <h2>Resort-First Commerce & Procurement</h2>
        <div class="grid">
            <div class="card">
                <h3>Control Procurement</h3>
                <p>Manage department requests, vendor quotes, and budget reserves in one dashboard.</p>
            </div>
            <div class="card">
                <h3>Reduce Import Surprises</h3>
                <p>Real-time landed cost estimates including customs duty and port charges.</p>
            </div>
            <div class="card">
                <h3>Track Cargo</h3>
                <p>Full visibility from international hubs to the resort jetty with Smart Corridors.</p>
            </div>
        </div>
    </section>

    <section class="section" style="background: var(--upos-silver);">
        <h2>The Main Brain Authority</h2>
        <div class="grid">
            <div class="card">
                <h3>AEGIS Identity</h3>
                <p>Verified staff, vendors, and captains.</p>
            </div>
            <div class="card">
                <h3>FCE Finance</h3>
                <p>Escrow-backed payments and automated settlements.</p>
            </div>
            <div class="card">
                <h3>SHADOW Audit</h3>
                <p>Immutable forensic proof of every event.</p>
            </div>
        </div>
    </section>

    <footer class="section" style="text-align: center;">
        <p>&copy; 2026 UPOS Cloud. United Universal Commerce Cloud.</p>
    </footer>
</body>
</html>
