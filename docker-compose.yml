version: '3.8'

services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: .
      dockerfile: ./services/gateway/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ELEONE_URL=http://eleone:8000
      - SHADOW_URL=http://shadow:8000
      - SVD_URL=http://svd:8000
      - SAL_URL=http://sal:8000
      - BFI_URL=http://bfi:8000
      - REDIS_HOST=redis
    depends_on:
      redis:
        condition: service_healthy

  gateway-worker:
    build:
      context: .
      dockerfile: ./services/gateway/Dockerfile
    command: ["python", "services/gateway/event_worker.py"]
    environment:
      - REDIS_HOST=redis
    depends_on:
      redis:
        condition: service_healthy
      gateway:
        condition: service_started

  eleone:
    build:
      context: .
      dockerfile: ./services/eleone/Dockerfile
    depends_on:
      redis:
        condition: service_healthy

  shadow:
    build:
      context: .
      dockerfile: ./services/shadow/Dockerfile
    depends_on:
      redis:
        condition: service_healthy

  svd:
    build:
      context: .
      dockerfile: ./services/svd/Dockerfile

  sal:
    build:
      context: .
      dockerfile: ./services/sal/Dockerfile

  bfi:
    build:
      context: .
      dockerfile: ./services/bfi/Dockerfile

  edge-node:
    build:
      context: .
      dockerfile: ./edge-node/Dockerfile
    ports:
      - "8006:8006"

  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=buildx
      - POSTGRES_PASSWORD=password
    volumes:
      - ./infra/db/init.sql:/docker-entrypoint-initdb.d/init.sql
