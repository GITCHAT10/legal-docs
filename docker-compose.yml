version: '3.8'

services:
  api-gateway:
    build:
      context: .
      dockerfile: mnos/interfaces/api_gateway/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MNOS_INTEGRATION_SECRET=top-secret
    depends_on:
      - aegis
      - eleone
      - shadow

  aegis:
    build:
      context: .
      dockerfile: mnos/core/aegis/Dockerfile
    ports:
      - "8001:8001"

  shadow:
    build:
      context: .
      dockerfile: mnos/core/shadow/Dockerfile
    ports:
      - "8002:8002"

  eleone:
    build:
      context: .
      dockerfile: mnos/core/eleone/Dockerfile
    ports:
      - "8003:8003"

  events:
    build:
      context: .
      dockerfile: mnos/core/events/Dockerfile
    ports:
      - "8004:8004"
    depends_on:
      - redis

  fce:
    build:
      context: .
      dockerfile: mnos/core/fce/Dockerfile
    ports:
      - "8005:8005"

  lifeline:
    build:
      context: .
      dockerfile: mnos/modules/lifeline/Dockerfile
    ports:
      - "8006:8006"
    environment:
      - MNOS_INTEGRATION_SECRET=top-secret

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  db:
    image: postgres:15-alpine
    volumes:
      - .:/app
    environment:
      - POSTGRES_DB=mnos_lifeline
      - POSTGRES_PASSWORD=password
    ports:
      - "5432:5432"
