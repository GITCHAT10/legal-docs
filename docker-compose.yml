version: '3.8'

services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # CORE SERVICES
  mnos-api:
    build:
      context: .
      dockerfile: ./services/core/mnos_api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ROUTER_URL=http://mnos-router:8000
      - SHADOW_URL=http://shadow:8002
      - MNOS_GATEWAY_SECRET=${MNOS_GATEWAY_SECRET:-mnos-prod-secret}
    depends_on:
      redis:
        condition: service_healthy

  mnos-router:
    build:
      context: .
      dockerfile: ./services/core/mnos_router/Dockerfile
    depends_on:
      - eleone
      - shadow
      - xport
      - aqua
      - inn
      - skygodown
      - atollairways
      - svd
      - bfi

  eleone:
    build:
      context: .
      dockerfile: ./services/core/eleone/Dockerfile
    depends_on:
      redis:
        condition: service_healthy

  shadow:
    build:
      context: .
      dockerfile: ./services/core/shadow/Dockerfile
    depends_on:
      redis:
        condition: service_healthy

  sal:
    build:
      context: .
      dockerfile: ./services/core/sal/Dockerfile

  event-worker:
    build:
      context: .
      dockerfile: ./services/core/mnos_api/Dockerfile
    command: ["python", "services/core/event_worker.py"]
    environment:
      - REDIS_HOST=redis
      - SAL_URL=http://sal:8004
    depends_on:
      redis:
        condition: service_healthy

  # MODULES
  xport:
    build:
      context: .
      dockerfile: ./modules/xport/Dockerfile
  aqua:
    build:
      context: .
      dockerfile: ./modules/aqua/Dockerfile
  inn:
    build:
      context: .
      dockerfile: ./modules/inn/Dockerfile
  skygodown:
    build:
      context: .
      dockerfile: ./modules/skygodown/Dockerfile
  atollairways:
    build:
      context: .
      dockerfile: ./modules/atollairways/Dockerfile
  svd:
    build:
      context: .
      dockerfile: ./modules/svd/Dockerfile
  bfi:
    build:
      context: .
      dockerfile: ./modules/bfi/Dockerfile
  edge-node:
    build:
      context: .
      dockerfile: ./edge-node/Dockerfile
    ports:
      - "8006:8006"

  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=buildx
      - POSTGRES_PASSWORD=password
    volumes:
      - ./infra/db/init.sql:/docker-entrypoint-initdb.d/init.sql
