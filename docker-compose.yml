version: '3.8'

services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: .
      dockerfile: ./infra/docker/Dockerfile.gateway
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # CORE
  aegis:
    build:
      context: .
      dockerfile: ./infra/docker/Dockerfile.aegis
    depends_on:
      redis:
        condition: service_healthy

  shadow:
    build:
      context: .
      dockerfile: ./infra/docker/Dockerfile.shadow
    depends_on:
      redis:
        condition: service_healthy

  eleone:
    build:
      context: .
      dockerfile: ./infra/docker/Dockerfile.eleone
    depends_on:
      redis:
        condition: service_healthy

  events:
    build:
      context: .
      dockerfile: ./infra/docker/Dockerfile.events
    depends_on:
      redis:
        condition: service_healthy

  fce:
    build:
      context: .
      dockerfile: ./infra/docker/Dockerfile.fce
    depends_on:
      redis:
        condition: service_healthy

  # MODULES
  lifeline:
    build:
      context: .
      dockerfile: ./infra/docker/Dockerfile.lifeline

  aasandha:
    build:
      context: .
      dockerfile: ./infra/docker/Dockerfile.aasandha

  pharmacy:
    build:
      context: .
      dockerfile: ./infra/docker/Dockerfile.pharmacy

  finance:
    build:
      context: .
      dockerfile: ./infra/docker/Dockerfile.finance
