      context: .
      dockerfile: ./services/svd/Dockerfile
    ports:
      - "8003:8003"
    environment:
      - PORT=8003
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  sal:
    build:
      context: .
      dockerfile: ./services/sal/Dockerfile
    ports:
      - "8004:8004"
    environment:
      - PORT=8004
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  bfi:
    build:
      context: .
      dockerfile: ./services/bfi/Dockerfile
    ports:
      - "8005:8005"
    environment:
      - PORT=8005
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  edge-node:
    build:
      context: .
      dockerfile: ./edge-node/Dockerfile
    ports:
      - "8006:8006"
    environment:
      - PORT=8006
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
      interval: 10s
      timeout: 5s
      retries: 3
